<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFA League Live Members</title>

<style>
body{
  margin:0;
  padding:10px;
  background:#050505;
  font-family:Arial,sans-serif;
}

.panel{
  background:linear-gradient(180deg,#080808,#111);
  border:2px solid #b00020;
  border-radius:20px;
  padding:14px;
  box-shadow:0 0 18px rgba(176,0,32,.75);
}

.title{
  color:#ff304f;
  font-weight:bold;
  font-size:18px;
  letter-spacing:1px;
  padding-bottom:8px;
  margin-bottom:12px;
  border-bottom:2px solid rgba(255,48,79,.45);
  text-align:center;
  text-shadow:0 0 10px #b00020;
}

.member-count{
  color:#ff304f;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin:8px 0 14px 0;
  padding:8px;
  border:1px solid rgba(255,48,79,.45);
  border-radius:12px;
  background:#101010;
}

.member-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#141414;
  border:1px solid rgba(255,48,79,.35);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 0 8px rgba(176,0,32,.25);
}

.member-card:hover{
  border-color:#ff304f;
  box-shadow:0 0 14px rgba(255,48,79,.6);
}

.member-avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  border:3px solid #ff304f;
  object-fit:cover;
  background:#222;
  flex-shrink:0;
}

.member-info{
  flex:1;
  min-width:0;
}

.member-name{
  color:#fff;
  font-weight:bold;
  font-size:15px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  color:#ff304f;
  font-size:11px;
  font-weight:bold;
  margin-left:4px;
}

.member-meta{
  color:#cfcfcf;
  font-size:12px;
  margin-top:3px;
}

.member-joined{
  color:#ff304f;
  font-size:12px;
  margin-top:4px;
  font-weight:bold;
}

.footer{
  text-align:center;
  color:#999;
  font-size:11px;
  margin-top:12px;
}

a{
  text-decoration:none;
}
</style>
</head>

<body>

<div class="panel">

  <div class="title">
    ⚔ ACFA LEAGUE LEGION ⚔
  </div>

  <div id="member-count" class="member-count">
    Loading Legion count...
  </div>

  <div id="newest-members">
    Loading newest Legionnaires...
  </div>

  <div class="footer">
    ACFA League<br>
    The Legion • No Timeouts • No Excuses
  </div>

</div>

<script>
async function loadLeagueMembers(){

  const clubSlug = "acfa-league";
  const box = document.getElementById("newest-members");
  const countBox = document.getElementById("member-count");

  try{

    const response = await fetch(
      `https://api.chess.com/pub/club/${clubSlug}/members?cacheBust=${Date.now()}`
    );

    const data = await response.json();

    let combinedMembers = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const memberMap = new Map();

    combinedMembers.forEach(member => {
      if(member.username){
        memberMap.set(member.username.toLowerCase(), member);
      }
    });

    const uniqueMembers = Array.from(memberMap.values());

    countBox.innerHTML = `⚔ ${uniqueMembers.length} Legionnaires`;

    const newest = uniqueMembers
      .filter(m => m.username && m.joined)
      .sort((a,b) => Number(b.joined) - Number(a.joined))
      .slice(0,5);

    let html = "";

    for(const member of newest){

      let avatar = "https://www.chess.com/bundles/web/images/user-image.007dad08.svg";

      try{
        const profileResponse = await fetch(
          `https://api.chess.com/pub/player/${member.username}?cacheBust=${Date.now()}`
        );

        const profile = await profileResponse.json();

        if(profile.avatar){
          avatar = profile.avatar;
        }

      }catch(e){}

      const daysAgo = Math.floor(
        (Date.now() / 1000 - Number(member.joined)) / 86400
      );

      const badge = daysAgo <= 7
        ? `<span class="badge">● NEW</span>`
        : "";

      const joinedText = daysAgo === 0
        ? "Joined today"
        : `Joined ${daysAgo} day${daysAgo === 1 ? "" : "s"} ago`;

      html += `
        <a href="${member.url || "https://www.chess.com/member/" + member.username}" target="_blank">
          <div class="member-card">
            <img class="member-avatar" src="${avatar}" alt="${member.username}">
            <div class="member-info">
              <div class="member-name">@${member.username} ${badge}</div>
              <div class="member-meta">Newest Legionnaire</div>
              <div class="member-joined">${joinedText}</div>
            </div>
          </div>
        </a>
      `;
    }

    box.innerHTML = html || `
      <div style="color:#ff7777;text-align:center;padding:12px;">
        No Legionnaires found.
      </div>
    `;

  }catch(error){

    countBox.innerHTML = "Unable to load count";

    box.innerHTML = `
      <div style="color:#ff7777;text-align:center;padding:12px;">
        Unable to load ACFA League members.
      </div>
    `;
  }
}

loadLeagueMembers();
</script>

</body>
</html>
